name: Protect Core Files

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - reader.py
      - __init__.py
      - dev.sh

jobs:
  reject:
    name: Auto-reject — protected file modified
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify modified protected files
        id: protected
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(reader\.py|__init__\.py|dev\.sh)$' | tr '\n' ' ' || true)
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Comment and close PR
        uses: actions/github-script@v7
        with:
          script: |
            const files = "${{ steps.protected.outputs.files }}".trim().split(/\s+/).filter(Boolean);
            const list = files.map(f => `\`${f}\``).join(", ");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## ❌ PR automatically rejected",
                "",
                `This PR modifies protected file(s): ${list}`,
                "",
                "These files must never be changed. See **CONTRIBUTE.md** → _Files, never to be touched_ for details.",
                "",
                "_This PR has been automatically closed._",
              ].join("\n"),
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: "closed",
            });
